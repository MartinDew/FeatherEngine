name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.name }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        build_type: [ Debug, Release, Development ]
        config:
          # ── macOS (Apple Clang) ──────────────────────────────────────────
          - name: macOS
            os: macos-latest
            extra_cmake_flags: ""
            # vex_renderer returns() early on Apple in its own CMakeLists

          # ── Linux (system Clang) ─────────────────────────────────────────
          - name: Linux
            os: ubuntu-24.04
            extra_cmake_flags: "-DUSE_LLVM=ON -DLLVM_USE_LIBCXX=ON"

          # ── Windows (LLVM / clang-cl, single-config Ninja) ───────────────
          - name: Windows LLVM
            os: windows-latest
            extra_cmake_flags: "-DUSE_LLVM=ON"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Python (required by GenerateEmbeddedResources) ────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      # ── Common dependencies ────────────────────────────────────────────────
      # Vulkan sdk
      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-use-cache: true
          vulkan-query-version: latest

      - name: Install LLVM
        if: runner.os == 'Windows' || runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      # ── macOS dependencies ────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      # ── Linux dependencies ────────────────────────────────────────────────
      # Add any extra system libs your thirdparties need (SDL3, assimp, etc.)
      # under the libx11-dev / libgl lines below.
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            clang \
            lld \
            python3 \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxi-dev \
            libudev-dev

      - name: Install SDL deps (Linux)
        if: runner.os == 'Linux'
        run : |
          sudo apt-get install -y git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev  \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: Install LLVM Gold Plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y binutils-gold llvm-20
          # The install-llvm-action tarball doesn't ship LLVMgold.so.
          # Clang resolves it relative to its own prefix, so we need it there.
          sudo mkdir -p "$LLVM_PATH/lib"
          sudo ln -sf /usr/lib/llvm-20/lib/LLVMgold.so "$LLVM_PATH/lib/LLVMgold.so"
          sudo mkdir -p /usr/lib/bfd-plugins
          sudo ln -sf /usr/lib/llvm-20/lib/LLVMgold.so /usr/lib/bfd-plugins/LLVMgold.so

      # ── Windows: LLVM toolchain ───────────────────────────────────────────
      # Puts clang-cl, lld-link and llvm-lib on PATH.
      # toolchain-llvm.cmake's find_llvm_tool() will pick them up without
      # needing LLVM_ROOT to be set explicitly.

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: k3DW/setup-msvc@v1
        with:
          vs-version: 17.14

      - name: Setup LLVM In Path
        if: runner.os == 'Windows'
        run: |
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Remove Strawberry Perl from PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Set UTF-8 Code Page
        if: runner.os == 'Windows'
        run: chcp 65001

      # ── Configure (all platforms, single-config Ninja) ────────────────────
      - name: Configure
        run: >
          cmake --preset ${{ matrix.build_type == 'Debug' && 'debug' || matrix.build_type == 'Release' && 'release' || 'development' }} ${{ matrix.config.extra_cmake_flags }}

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build Editor
        run: cmake --build --preset ${{ matrix.build_type == 'Debug' && 'debug' || matrix.build_type == 'Release' && 'release' || 'development' }} --target Editor --parallel

      - name: Build Standalone
        run: cmake --build --preset ${{ matrix.build_type == 'Debug' && 'debug' || matrix.build_type == 'Release' && 'release' || 'development' }} --target Standalone --parallel

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: feather-${{ matrix.config.name }}-${{ matrix.build_type }}
          path: build/*/bin/*
          if-no-files-found: warn
          retention-days: 7