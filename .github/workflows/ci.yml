name: CI

on:
  push:
    branches: [ master, build-system-exploration ]
  pull_request:
    branches: [ master, build-system-exploration ]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.name }} / ${{ matrix.mode }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        mode: [ debug, releasedbg, release ]
        config:
          # ── macOS (Apple Clang) ──────────────────────────────────────────
          - name: macOS
            os: macos-latest
            toolchain_flag: ""
            # vex_renderer is disabled on Apple in its own xmake.lua

          # ── Linux (LLVM/Clang) ───────────────────────────────────────────
          - name: Linux
            os: ubuntu-24.04
            toolchain_flag: "--toolchain=llvm"

          # ── Windows (clang-cl) ───────────────────────────────────────────
          - name: Windows LLVM
            os: windows-latest
            toolchain_flag: "--toolchain=clang-cl"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Python (required by codegen scripts) ──────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Install xmake ─────────────────────────────────────────────────────
      - name: Install xmake
        uses: xmake-io/github-action-xmake@v1

      # ── Vulkan SDK ────────────────────────────────────────────────────────
      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-use-cache: true
          vulkan-query-version: latest

      # ── LLVM (Linux + Windows) ────────────────────────────────────────────
      - name: Install LLVM
        if: runner.os == 'Windows' || runner.os == 'Linux'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "20"

      # ── Linux system dependencies ─────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            clang \
            lld \
            python3 \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxi-dev \
            libudev-dev

      - name: Install SDL deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y git make \
          pkg-config cmake ninja-build gnome-desktop-testing libasound2-dev libpulse-dev \
          libaudio-dev libfribidi-dev libjack-dev libsndio-dev libx11-dev libxext-dev \
          libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev libxtst-dev \
          libxkbcommon-dev libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev \
          libegl1-mesa-dev libdbus-1-dev libibus-1.0-dev libudev-dev libthai-dev  \
          libpipewire-0.3-dev libwayland-dev libdecor-0-dev liburing-dev

      - name: Install LLVM Gold Plugin (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y binutils-gold llvm-20
          # The install-llvm-action tarball doesn't ship LLVMgold.so.
          # Clang resolves it relative to its own prefix, so we need it there.
          sudo mkdir -p "$LLVM_PATH/lib"
          sudo ln -sf /usr/lib/llvm-20/lib/LLVMgold.so "$LLVM_PATH/lib/LLVMgold.so"
          sudo mkdir -p /usr/lib/bfd-plugins
          sudo ln -sf /usr/lib/llvm-20/lib/LLVMgold.so /usr/lib/bfd-plugins/LLVMgold.so

      # ── Windows toolchain ─────────────────────────────────────────────────
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: k3DW/setup-msvc@v1
        with:
          vs-version: 17.14

      - name: Setup LLVM In Path
        if: runner.os == 'Windows'
        run: echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Remove Strawberry Perl from PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'Strawberry' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Set UTF-8 Code Page (Windows)
        if: runner.os == 'Windows'
        run: chcp 65001

      # ── xmake package cache ───────────────────────────────────────────────
      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: xmake-${{ runner.os }}-${{ hashFiles('thirdparty/xmake.lua', 'thirdparty/packages/*.lua') }}
          restore-keys: xmake-${{ runner.os }}-

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure
        run: xmake f -m ${{ matrix.mode }} ${{ matrix.config.toolchain_flag }} -y

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: xmake build -v feather.editor feather.standalone

      # ── Upload artifacts ───────────────────────────────────────────────────
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: feather-${{ matrix.config.name }}-${{ matrix.mode }}
          path: build/bin/*
          if-no-files-found: warn
          retention-days: 7
